<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>楕円運動シミュレーション（ラベル修正版）</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; 
            font-family: sans-serif; background-color: #1e272e; color: #d2dae2; margin-top: 20px;
        }
        .dashboard {
            background: #2f3640; padding: 15px 30px; border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 15px; width: 640px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .stats { font-size: 16px; font-weight: bold; line-height: 1.6; }
        .highlight { color: #0be881; font-size: 20px; }
        canvas { 
            background-color: #000; border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 20px;
        }
        .controls { 
            background: #2f3640; padding: 20px; border-radius: 8px; 
            display: flex; gap: 30px; width: 660px; justify-content: center;
        }
        label { display: flex; flex-direction: column; font-size: 14px; align-items: center; }
        input[type="range"] { margin-top: 10px; width: 150px; }
    </style>
</head>
<body>
    <h2>楕円運動と距離の和</h2>
    
    <div class="dashboard">
        <div class="stats">
            <span style="color:#f1c40f">r1 (F1からの距離)</span> : <span id="val_r1">0.0</span><br>
            <span style="color:#e67e22">r2 (F2からの距離)</span> : <span id="val_r2">0.0</span>
        </div>
        <div class="stats" style="text-align: right;">
            r1 + r2 = <span id="val_sum" class="highlight">0.0</span><br>
            長軸の長さ (2a) = <span id="val_major" class="highlight">0.0</span>
        </div>
    </div>

    <canvas id="simCanvas" width="700" height="500"></canvas>
    
    <div class="controls">
        <label>半長軸 a (横)<input type="range" id="a_slider" min="100" max="280" value="250"></label>
        <label>半短軸 b (縦)<input type="range" id="b_slider" min="50" max="220" value="150"></label>
        <label>スピード<input type="range" id="speed_slider" min="0" max="10" value="3"></label>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        let angle = 0;

        function draw() {
            const a = parseInt(document.getElementById('a_slider').value);
            const b = parseInt(document.getElementById('b_slider').value);
            const speed = parseInt(document.getElementById('speed_slider').value) * 0.002;

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 長軸・短軸の判定
            const isHorizontal = a >= b;
            const majorAxis = isHorizontal ? a : b;
            const minorAxis = isHorizontal ? b : a;
            
            // 焦点位置の計算
            const f = Math.sqrt(majorAxis * majorAxis - minorAxis * minorAxis);
            const f1 = { x: cx + (isHorizontal ? f : 0), y: cy + (isHorizontal ? 0 : f) };
            const f2 = { x: cx - (isHorizontal ? f : 0), y: cy - (isHorizontal ? 0 : f) };

            // 軌道（点線）
            ctx.beginPath();
            ctx.ellipse(cx, cy, a, b, 0, 0, 2 * Math.PI);
            ctx.strokeStyle = '#576574';
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);

            // 十字の補助線
            ctx.beginPath();
            ctx.moveTo(cx - a - 20, cy); ctx.lineTo(cx + a + 20, cy);
            ctx.moveTo(cx, cy - b - 20); ctx.lineTo(cx, cy + b + 20);
            ctx.strokeStyle = '#353b48';
            ctx.stroke();

            // 半長軸(a)・半短軸(b)のハイライト
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + a, cy); // a
            ctx.strokeStyle = 'rgba(46, 204, 113, 0.6)'; ctx.stroke();
            
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy - b); // b
            ctx.strokeStyle = 'rgba(155, 89, 182, 0.6)'; ctx.stroke();
            ctx.lineWidth = 1;

            // テキストの基本設定
            ctx.font = "14px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // 軸のラベル（端に配置して動く点と重ならないようにする）
            ctx.fillStyle = '#bdc3c7';
            ctx.fillText(isHorizontal ? "長軸" : "短軸", cx - a - 35, cy);
            ctx.fillText(isHorizontal ? "短軸" : "長軸", cx, cy + b + 30);

            // 半長軸・半短軸のラベル
            ctx.fillStyle = '#2ecc71';
            ctx.fillText("半長軸(a)", cx + a / 2, cy + 15);
            ctx.fillStyle = '#9b59b6';
            ctx.fillText("半短軸(b)", cx - 35, cy - b / 2);

            // 焦点 F1, F2
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath(); ctx.arc(f1.x, f1.y, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillText("F1(焦点)", f1.x, f1.y + 20);

            ctx.fillStyle = '#e67e22';
            ctx.beginPath(); ctx.arc(f2.x, f2.y, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillText("F2(焦点)", f2.x, f2.y + 20);

            // 中心点
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2); ctx.fill();

            // 点Pの計算
            const px = cx + a * Math.cos(angle);
            const py = cy + b * Math.sin(angle);

            // r1, r2 のライン
            ctx.beginPath();
            ctx.moveTo(f1.x, f1.y); ctx.lineTo(px, py);
            ctx.strokeStyle = 'rgba(241, 196, 15, 0.7)'; ctx.lineWidth = 2; ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(f2.x, f2.y); ctx.lineTo(px, py);
            ctx.strokeStyle = 'rgba(230, 126, 34, 0.7)'; ctx.lineWidth = 2; ctx.stroke();
            ctx.lineWidth = 1;

            // 点Pの描画
            ctx.fillStyle = '#3498db';
            ctx.beginPath(); ctx.arc(px, py, 8, 0, Math.PI*2); ctx.fill();
            
            // 点Pのラベル（位置によってオフセットを変え、極力重ならないようにする）
            ctx.fillStyle = '#ffffff';
            const labelOffsetX = (px >= cx) ? 30 : -30;
            const labelOffsetY = (py >= cy) ? 30 : -30;
            ctx.fillText("点P", px + labelOffsetX, py + labelOffsetY);

            // 距離の計算
            const r1 = Math.hypot(px - f1.x, py - f1.y);
            const r2 = Math.hypot(px - f2.x, py - f2.y);
            const sum = r1 + r2;

            // HTML側の数値を更新
            document.getElementById('val_r1').innerText = r1.toFixed(1);
            document.getElementById('val_r2').innerText = r2.toFixed(1);
            document.getElementById('val_sum').innerText = sum.toFixed(1);
            document.getElementById('val_major').innerText = (majorAxis * 2).toFixed(1);

            angle -= speed;
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
