<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重力の成り立ちシミュレーション（ライン切替機能付き）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
        }
        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
        }
        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .toggles {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 5px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
        }
        .toggles label {
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        input[type="range"] {
            flex-grow: 1;
            margin: 0 15px;
        }
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .canvas-container {
            display: flex;
            justify-content: center;
            position: relative;
        }
        canvas {
            border: 1px solid #ddd;
            background-color: #fafafa;
            border-radius: 4px;
        }
        .legend {
            margin-top: 15px;
            display: flex;
            justify-content: space-around;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .legend span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .color-box {
            width: 15px;
            height: 15px;
            border-radius: 3px;
        }
        .description {
            font-size: 0.9rem;
            color: #666;
            margin-top: 10px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>重力 ＝ 万有引力 ＋ 遠心力</h1>
    
    <div class="controls">
        <div class="control-group">
            <label for="latitude">緯度（北極〜赤道）: <span id="latValue">45</span>°</label>
            <input type="range" id="latitude" min="0" max="90" value="45">
        </div>
        <div class="control-group">
            <label for="multiplier">表示上の遠心力: 万有引力の <span id="multValue">0.200</span> 倍</label>
            <input type="range" id="multiplier" min="0.003" max="0.500" step="0.001" value="0.200">
        </div>
        
        <div class="toggles">
            <label style="color: #4CAF50;">
                <input type="checkbox" id="showPlumb" checked> 鉛直線を表示
            </label>
            <label style="color: #2196F3;">
                <input type="checkbox" id="showVertical"> 垂直線を表示
            </label>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="simCanvas" width="600" height="500"></canvas>
    </div>

    <div class="legend">
        <span><div class="color-box" style="background: #2196F3;"></div> 万有引力</span>
        <span><div class="color-box" style="background: #F44336;"></div> 遠心力</span>
        <span><div class="color-box" style="background: #4CAF50;"></div> 重力 (合力)</span>
    </div>

    <div class="description">
        <p>※ 実際の赤道上での遠心力は<strong>万有引力の約0.003倍（約1/290）</strong>です。スライダーを左端にすると実際の比率になりますが、ズレを確認するために誇張して表示できます。</p>
        <p>※ <strong>鉛直線</strong>は重力の方向を示す線です。<strong>垂直線</strong>は地表面（球面）と90度に交わる線（地球中心への延長線）です。</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    // スライダーとチェックボックスの要素取得
    const latSlider = document.getElementById('latitude');
    const multSlider = document.getElementById('multiplier');
    const latValue = document.getElementById('latValue');
    const multValue = document.getElementById('multValue');
    const chkPlumb = document.getElementById('showPlumb');
    const chkVertical = document.getElementById('showVertical');

    // 地球の設定（1/4円）
    const cx = 100; // 中心X
    const cy = 400; // 中心Y
    const R = 300;  // 半径

    function drawArrow(fromX, fromY, toX, toY, color, width = 2) {
        const headlen = 10;
        const dx = toX - fromX;
        const dy = toY - fromY;
        const angle = Math.atan2(dy, dx);
        
        ctx.beginPath();
        ctx.moveTo(fromX, fromY);
        ctx.lineTo(toX, toY);
        ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
        ctx.moveTo(toX, toY);
        ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.stroke();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const latDeg = parseFloat(latSlider.value);
        const latRad = latDeg * (Math.PI / 180);
        const multiplier = parseFloat(multSlider.value);

        // --- 基準軸の描画 ---
        ctx.beginPath();
        ctx.moveTo(cx, 50); ctx.lineTo(cx, cy + 50); // 自転軸
        ctx.moveTo(cx - 50, cy); ctx.lineTo(cx + R + 50, cy); // 赤道面
        ctx.strokeStyle = '#ccc';
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        ctx.stroke();
        ctx.setLineDash([]); 

        ctx.fillStyle = '#999';
        ctx.font = '14px Arial';
        ctx.fillText('自転軸 (北極方向)', cx - 50, 40);
        ctx.fillText('赤道面', cx + R + 10, cy + 20);
        ctx.fillText('地球中心', cx - 20, cy + 20);

        // --- 自転を示す矢印 ---
        ctx.beginPath();
        ctx.ellipse(cx, 80, 35, 12, 0, Math.PI, 0, true);
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(cx + 35 - 5, 80 + 8);
        ctx.lineTo(cx + 35, 80);
        ctx.lineTo(cx + 35 + 5, 80 + 8);
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 1.5;
        ctx.lineJoin = 'miter';
        ctx.stroke();
        
        ctx.fillStyle = '#888';
        ctx.fillText('自転', cx + 45, 85);

        // --- 1/4地球の描画 ---
        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, -Math.PI / 2, true);
        ctx.lineTo(cx, cy);
        ctx.fillStyle = '#e3f2fd';
        ctx.fill();
        ctx.strokeStyle = '#90caf9';
        ctx.lineWidth = 2;
        ctx.stroke();

        // 質点の位置
        const px = cx + R * Math.cos(latRad);
        const py = cy - R * Math.sin(latRad);

        ctx.beginPath();
        ctx.arc(px, py, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#333';
        ctx.fill();

        // --- 力のベクトル計算 ---
        const Fg_mag = 150; 
        const fg_x = -Fg_mag * Math.cos(latRad);
        const fg_y = Fg_mag * Math.sin(latRad);

        const display_Fc_mag = Fg_mag * multiplier * Math.cos(latRad); 
        const fc_x = display_Fc_mag;
        const fc_y = 0; 

        const g_x = fg_x + fc_x;
        const g_y = fg_y + fc_y;

        // 平行四辺形の補助線
        ctx.beginPath();
        ctx.moveTo(px + fg_x, py + fg_y);
        ctx.lineTo(px + g_x, py + g_y);
        ctx.moveTo(px + fc_x, py + fc_y);
        ctx.lineTo(px + g_x, py + g_y);
        ctx.strokeStyle = '#999';
        ctx.setLineDash([4, 4]);
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.setLineDash([]);

        // 各ベクトルの描画
        drawArrow(px, py, px + fg_x, py + fg_y, '#2196F3', 2); // 万有引力
        drawArrow(px, py, px + fc_x, py + fc_y, '#F44336', 2); // 遠心力
        drawArrow(px, py, px + g_x, py + g_y, '#4CAF50', 3);   // 重力

        // --- 補助線の表示切り替え ---
        const lineLength = 120; 

        // 1. 垂直線（地表面と90度＝地球中心の反対方向）
        if (chkVertical.checked) {
            const fg_len = Math.sqrt(fg_x * fg_x + fg_y * fg_y);
            const v_x = -(fg_x / fg_len) * lineLength;
            const v_y = -(fg_y / fg_len) * lineLength;

            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(px + v_x, py + v_y);
            ctx.strokeStyle = '#2196F3';
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            ctx.fillStyle = '#2196F3';
            ctx.font = 'bold 12px Arial';
            ctx.fillText('垂直線', px + v_x - 10, py + v_y - 10);
        }

        // 2. 鉛直線（重力の反対方向）
        if (chkPlumb.checked) {
            const g_len = Math.sqrt(g_x * g_x + g_y * g_y);
            const p_x = -(g_x / g_len) * lineLength;
            const p_y = -(g_y / g_len) * lineLength;

            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(px + p_x, py + p_y);
            ctx.strokeStyle = '#4CAF50';
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            ctx.fillStyle = '#4CAF50';
            ctx.font = 'bold 12px Arial';
            ctx.fillText('鉛直線', px + p_x - 10, py + p_y - 10);
        }
    }

    // イベントリスナーの登録
    latSlider.addEventListener('input', (e) => {
        latValue.textContent = e.target.value;
        draw();
    });

    multSlider.addEventListener('input', (e) => {
        multValue.textContent = parseFloat(e.target.value).toFixed(3);
        draw();
    });

    chkPlumb.addEventListener('change', draw);
    chkVertical.addEventListener('change', draw);

    // 初期描画
    draw();
</script>

</body>
</html>
